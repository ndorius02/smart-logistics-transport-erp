server:
  port: 8038

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

spring:
  application:
    name: smart-logistics-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_logistics
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  sql:
    init:
      mode: never

  logging:
    level:
      org.springframework.security: DEBUG